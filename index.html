<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#fff;}
  body{font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;-webkit-font-smoothing:antialiased;}
  a{color:#1a44cc;text-decoration:none;} a:hover{text-decoration:underline;}
  [contenteditable][data-ph]:empty:before{content:attr(data-ph);color:#bcbcbc;font-style:italic;}
  ::selection{background:#1a44cc;color:#fff;}
</style>
</helmet>
<div style="position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;background:#fff;">

  <div style="display:flex;justify-content:center;padding:13px 16px 0;flex:none;">
    <div style="{{ headerInnerStyle }}">
      <h1 style="margin: 0; font-size: 20px; font-weight: normal; letter-spacing: .2px; font-family: Roboto">Xavier Dersy</h1>
      <div style="position:relative;" ref="{{ pwWrapRef }}">
        <div style="display:flex;align-items:center;gap:8px;">
          <sc-if value="{{ showStatus }}" hint-placeholder-val="{{ false }}">
            <span title="{{ statusTitle }}" style="{{ statusStyle }}">{{ statusText }}</span>
          </sc-if>
          <span onClick="{{ lockClick }}" title="{{ lockHint }}" style="{{ lockStyle }}" style-hover="{{ lockHoverStyle }}">
            <div style="{{ lockShackleStyle }}"></div>
            <div style="{{ lockBodyStyle }}"></div>
          </span>
        </div>
        <sc-if value="{{ pwOpen }}" hint-placeholder-val="{{ false }}">
          <input type="password" autoFocus="{{ true }}" onKeyDown="{{ onPwKey }}" placeholder="{{ pwPlaceholder }}" style="{{ pwInputStyle }}" />
        </sc-if>
        <sc-if value="{{ tokenOpen }}" hint-placeholder-val="{{ false }}">
          <input type="password" autoFocus="{{ true }}" onKeyDown="{{ onTokenKey }}" placeholder="{{ tokenPlaceholder }}" style="{{ pwInputStyle }}" />
        </sc-if>
      </div>
    </div>
  </div>

  <div style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div ref="{{ gridRef }}" style="display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(5,1fr);gap:6px;height:100%;aspect-ratio:2;max-width:100%;">
      <sc-for list="{{ tiles }}" as="t" hint-placeholder-count="50">
        <div onClick="{{ t.open }}" onDrop="{{ t.onDrop }}" onDragOver="{{ allowDrop }}" title="{{ t.hint }}" style="position:relative;background:#fff;border:1px solid #e2e2e2;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;" style-hover="{{ t.hover }}">
          <span style="{{ t.numStyle }}">{{ t.label }}</span>
          <div style="{{ t.bg }}"></div>
        </div>
      </sc-for>
    </div>
  </div>

  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ close }}" style="position:fixed;inset:0;background:rgba(17,17,17,.3);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:5vh 16px;">
      <div onClick="{{ stop }}" style="position:relative;width:min(720px,94vw);max-height:90vh;overflow-y:auto;background:#fff;border-radius:8px;box-shadow:0 24px 70px rgba(0,0,0,.2);padding:44px 48px 52px;">

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;">
          <div style="display:flex;align-items:center;gap:16px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1.5px;color:#a6a6a6;">
            <span onClick="{{ prev }}" style="cursor:pointer;font-size:15px;">←</span>
            <span>{{ activeLabel }} / 50</span>
            <span onClick="{{ next }}" style="cursor:pointer;font-size:15px;">→</span>
          </div>
          <span onClick="{{ close }}" style="cursor:pointer;font-size:22px;line-height:1;color:#9a9a9a;">×</span>
        </div>

        <div contentEditable="{{ unlocked }}" suppressContentEditableWarning="{{ true }}" data-ph="{{ titlePh }}" onBlur="{{ onTitleBlur }}" dangerouslySetInnerHTML="{{ titleHtml }}" style="font-size:30px;line-height:1.2;font-weight:normal;outline:none;margin-bottom:14px;"></div>

        <div contentEditable="{{ unlocked }}" suppressContentEditableWarning="{{ true }}" data-ph="{{ descPh }}" onBlur="{{ onDescBlur }}" dangerouslySetInnerHTML="{{ descHtml }}" style="font-size:15px;line-height:1.65;color:#3a3a3a;outline:none;"></div>

        <div style="display:flex;flex-direction:column;gap:14px;margin-top:30px;">
          <sc-for list="{{ photos }}" as="p" hint-placeholder-count="0">
            <div onDrop="{{ p.onDrop }}" onDragOver="{{ allowDrop }}" style="position:relative;">
              <div style="{{ p.style }}"></div>
              <span onClick="{{ p.remove }}" style="{{ p.removeStyle }}">REMOVE</span>
            </div>
          </sc-for>
          <sc-if value="{{ canAdd }}" hint-placeholder-val="{{ true }}">
            <div onClick="{{ addNext }}" onDrop="{{ addDrop }}" onDragOver="{{ allowDrop }}" style="border:1px dashed #d2d2d2;border-radius:5px;padding:44px 20px;text-align:center;cursor:pointer;color:#b0b0b0;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.5px;">+ add image · or drop one here</div>
          </sc-if>
        </div>
      </div>
    </div>
  </sc-if>

  <input type="file" accept="image/*" ref="{{ fileRef }}" onChange="{{ onFile }}" style="display:none;">
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#111111&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#1a44cc&quot;,&quot;#111111&quot;,&quot;#b0451f&quot;,&quot;#2f7d4f&quot;]},&quot;showTileNumbers&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
const PW_HASH = '7b653a62faee3d451d20a3c84a5737c5f2d6f2a60d027fc5c6cd014d2a3f396c';
const GH_OWNER = 'nouillepascuite';
const GH_REPO = 'Portfolio-Xavier-Dersy';
const GH_BRANCH = 'main';
const CONTENT_PATH = 'content.json';

function b64EncodeUnicode(str){
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode('0x' + p1)));
}

class Component extends DCLogic {
  state = { open:false, active:0, view:'t0', images:{}, texts:{}, localPreview:{}, unlocked:false, pwOpen:false, pwError:false, ghToken:'', tokenOpen:false, tokenError:false, publishing:false, publishError:'', mosaicWidth:0 };
  fileRef = React.createRef();
  pwWrapRef = React.createRef();
  gridRef = React.createRef();
  pendingKey = null;

  componentDidMount(){
    this.loadContent();
    let ghToken=''; try{ ghToken = sessionStorage.getItem('pm_gh_token_v1') || ''; }catch(_){}
    let unlocked=false; try{ unlocked = sessionStorage.getItem('pm_unlocked_v1')==='1' && !!ghToken; }catch(_){}
    this.setState({ ghToken, unlocked });
    this._key = this.onKey.bind(this);
    window.addEventListener('keydown', this._key);
    this._outsideClick = this.onOutsideClick.bind(this);
    document.addEventListener('mousedown', this._outsideClick);
    if(this.gridRef.current && typeof ResizeObserver!=='undefined'){
      this._ro = new ResizeObserver((entries)=>{
        const box = entries[0] && entries[0].contentRect;
        const w = box ? box.width : this.gridRef.current.getBoundingClientRect().width;
        this.setState({ mosaicWidth: Math.round(w) });
      });
      this._ro.observe(this.gridRef.current);
    }
  }
  componentWillUnmount(){
    window.removeEventListener('keydown', this._key);
    document.removeEventListener('mousedown', this._outsideClick);
    if(this._ro) this._ro.disconnect();
  }

  loadContent(){
    const apply = (txt)=>{ try{ const j = JSON.parse(txt); this.setState({ images: j.images||{}, texts: j.texts||{} }); }catch(_){} };
    fetch('content.json')
      .then(r=> r.ok ? r.text() : Promise.reject())
      .then(apply)
      .catch(()=>{
        fetch(`https://${GH_OWNER}.github.io/${GH_REPO}/content.json`)
          .then(r=> r.ok ? r.text() : Promise.reject())
          .then(apply)
          .catch(()=>{});
      });
  }

  onOutsideClick(e){
    if(!this.state.pwOpen && !this.state.tokenOpen) return;
    if(this.pwWrapRef.current && this.pwWrapRef.current.contains(e.target)) return;
    this.setState({ pwOpen:false, pwError:false, tokenOpen:false, tokenError:false });
  }

  async checkPassword(pw){
    try{
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      return hex === PW_HASH;
    }catch(_){ return false; }
  }

  async verifyToken(token){
    try{
      const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`, { headers:{ Authorization:'token '+token, Accept:'application/vnd.github+json' } });
      if(!res.ok) return false;
      const j = await res.json();
      return !!(j.permissions && j.permissions.push);
    }catch(_){ return false; }
  }

  onKey(e){
    if(!this.state.open) return;
    if(e.key==='Escape'){ this.setState({open:false}); return; }
    if(document.activeElement && document.activeElement.isContentEditable) return;
    if(e.key==='ArrowLeft') this.go(-1);
    else if(e.key==='ArrowRight') this.go(1);
  }

  go(d){ this.setState(s=>{ const n=(s.active+d+50)%50; return { active:n, view:'t'+n }; }); }
  openAt(n){ this.setState({ open:true, active:n, view:'t'+n }); }

  ghHeaders(extra){
    return Object.assign({ Authorization:'token '+this.state.ghToken, Accept:'application/vnd.github+json' }, extra||{});
  }

  async getContentSha(){
    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${CONTENT_PATH}?ref=${GH_BRANCH}`, { headers: this.ghHeaders() });
    if(res.status===404) return null;
    if(!res.ok) throw new Error('could not read content.json ('+res.status+')');
    const j = await res.json();
    return j.sha;
  }

  async publishContentNow(images, texts, isRetry){
    const sha = await this.getContentSha();
    const body = { message:'Update portfolio content', content: b64EncodeUnicode(JSON.stringify({images,texts}, null, 2)), branch:GH_BRANCH };
    if(sha) body.sha = sha;
    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${CONTENT_PATH}`, { method:'PUT', headers:this.ghHeaders({'Content-Type':'application/json'}), body:JSON.stringify(body) });
    if(res.status===409 && !isRetry) return this.publishContentNow(images, texts, true);
    if(!res.ok) throw new Error('publish failed ('+res.status+')');
  }

  async publishImageNow(path, dataUrl){
    const base64 = dataUrl.split(',')[1];
    const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, { method:'PUT', headers:this.ghHeaders({'Content-Type':'application/json'}), body: JSON.stringify({ message:'Add image '+path, content: base64, branch:GH_BRANCH }) });
    if(!res.ok) throw new Error('image upload failed ('+res.status+')');
  }

  queuePublish(task){
    this._publishQueue = (this._publishQueue || Promise.resolve())
      .then(()=>{ this.setState({ publishing:true, publishError:'' }); return task(); })
      .then(()=>{ this.setState({ publishing:false }); })
      .catch((err)=>{ this.setState({ publishing:false, publishError: (err && err.message) || 'publish failed' }); });
    return this._publishQueue;
  }

  saveText(key,val){
    if(!this.state.unlocked) return;
    this.setState(s=>{
      const texts={...s.texts,[key]:val};
      this.queuePublish(()=>this.publishContentNow(s.images, texts));
      return {texts};
    });
  }

  pickFor(key){ if(!this.state.unlocked) return; this.pendingKey=key; if(this.fileRef.current) this.fileRef.current.click(); }

  removeImage(key){
    if(!this.state.unlocked) return;
    this.setState(s=>{
      const images={...s.images}; delete images[key];
      const localPreview={...s.localPreview}; delete localPreview[key];
      this.queuePublish(()=>this.publishContentNow(images, s.texts));
      return { images, localPreview };
    });
  }

  onFile(e){ if(!this.state.unlocked){ e.target.value=''; return; } const f=e.target.files && e.target.files[0]; if(f) this.loadFile(f, this.pendingKey, true); e.target.value=''; }
  onDropKey(key,e,setView){ e.preventDefault(); if(!this.state.unlocked) return; const f=e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]; if(f) this.loadFile(f, key, setView); }

  loadFile(file, key, setView){
    if(!key) return;
    const isGif = file.type==='image/gif';
    const finish=(dataUrl)=>{
      this.setState(s=>{
        const localPreview = {...s.localPreview, [key]:dataUrl};
        return setView ? { localPreview, view:key } : { localPreview };
      });
      const ext = isGif ? 'gif' : 'jpg';
      const path = `images/${key}-${Date.now()}.${ext}`;
      this.queuePublish(async ()=>{
        await this.publishImageNow(path, dataUrl);
        const images = { ...this.state.images, [key]: path };
        await this.publishContentNow(images, this.state.texts);
        this.setState({ images });
      });
    };
    if(isGif){ const r=new FileReader(); r.onload=e=>finish(e.target.result); r.readAsDataURL(file); return; }
    const r=new FileReader();
    r.onload=e=>{ const img=new Image(); img.onload=()=>{ const max=760; const sc=Math.min(1, max/Math.max(img.width,img.height)); const w=Math.max(1,Math.round(img.width*sc)), h=Math.max(1,Math.round(img.height*sc)); const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); let data; try{ data=c.toDataURL('image/jpeg',0.82); }catch(_){ data=e.target.result; } finish(data); }; img.onerror=()=>finish(e.target.result); img.src=e.target.result; };
    r.readAsDataURL(file);
  }

  renderVals(){
    const { images, texts, localPreview, open, active, view, unlocked, pwOpen, pwError, ghToken, tokenOpen, tokenError, publishing, publishError, mosaicWidth } = this.state;
    const accent = this.props.accentColor || '#1a44cc';
    const showNums = this.props.showTileNumbers !== false;
    const esc=(t)=>(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    const srcFor=(k)=> localPreview[k] || images[k];

    const tiles = Array.from({length:50},(_,i)=>{
      const key='t'+i; const src=srcFor(key); const label=String(i+1).padStart(2,'0');
      return {
        label: showNums ? label : '',
        hint: 'Project '+label+(src?'':' — drop an image or click to open'),
        numStyle: { fontFamily:"'Courier New',monospace", fontSize:'11px', color:'#cccccc' },
        bg: src ? { position:'absolute', inset:0, backgroundImage:`url(${src})`, backgroundSize:'cover', backgroundPosition:'center' } : { display:'none' },
        hover: { boxShadow:`inset 0 0 0 2px ${accent}`, zIndex:2 },
        open: ()=>this.openAt(i),
        onDrop: (e)=>this.onDropKey(key,e,false)
      };
    });

    const n=active;
    const orderKeys=['t'+n,'g'+n+'-0','g'+n+'-1','g'+n+'-2','g'+n+'-3','g'+n+'-4'];
    const photos=orderKeys.filter(k=>srcFor(k)).map(k=>({
      style: { width:'100%', height:'46vh', minHeight:'220px', maxHeight:'70vh', backgroundImage:`url(${srcFor(k)})`, backgroundSize:'contain', backgroundRepeat:'no-repeat', backgroundPosition:'center', backgroundColor:'#fafafa', borderRadius:'5px' },
      onDrop:(e)=>this.onDropKey(k,e,false),
      remove:(e)=>{ if(e)e.stopPropagation(); this.removeImage(k); },
      removeStyle: unlocked ? { position:'absolute', top:'10px', right:'10px', background:'rgba(255,255,255,.92)', borderRadius:'4px', padding:'3px 9px', fontFamily:"'Courier New',monospace", fontSize:'10px', letterSpacing:'.5px', color:'#555', cursor:'pointer' } : { display:'none' }
    }));
    const firstEmpty=orderKeys.find(k=>!srcFor(k));

    return {
      tiles, open, unlocked,
      allowDrop:(e)=>e.preventDefault(),
      activeLabel: String(n+1).padStart(2,'0'),
      photos,
      canAdd: unlocked && !!firstEmpty,
      addNext: ()=>{ if(firstEmpty) this.pickFor(firstEmpty); },
      addDrop: (e)=>{ if(firstEmpty) this.onDropKey(firstEmpty,e,false); },
      titleHtml:{ __html: esc(texts['title'+n]) },
      descHtml:{ __html: esc(texts['desc'+n]) },
      titlePh: unlocked ? 'Untitled project' : '',
      descPh: unlocked ? 'Click to add a description…' : '',
      onTitleBlur:(e)=>this.saveText('title'+n, e.target.innerText),
      onDescBlur:(e)=>this.saveText('desc'+n, e.target.innerText),
      fileRef:this.fileRef,
      onFile:(e)=>this.onFile(e),
      pwWrapRef:this.pwWrapRef,
      gridRef:this.gridRef,
      headerInnerStyle: { width: mosaicWidth ? mosaicWidth+'px' : 'auto', display:'flex', alignItems:'baseline', justifyContent:'space-between' },
      close:(e)=>{ if(e)e.stopPropagation(); this.setState({open:false}); },
      stop:(e)=>e.stopPropagation(),
      prev:(e)=>{ if(e)e.stopPropagation(); this.go(-1); },
      next:(e)=>{ if(e)e.stopPropagation(); this.go(1); },

      lockHint: unlocked ? 'Editing unlocked — click to lock' : 'Click to unlock editing',
      lockStyle: { display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', width:'26px', height:'26px', cursor:'pointer' },
      lockHoverStyle: { filter:'brightness(0.65)' },
      lockShackleStyle: { width:'9px', height:'7px', border:'1.6px solid ' + (unlocked ? accent : '#c7c7c7'), borderBottom:'none', borderRadius:'5px 5px 0 0', boxSizing:'border-box' },
      lockBodyStyle: { width:'13px', height:'9px', background: unlocked ? accent : '#c7c7c7', borderRadius:'1.5px', marginTop:'-1px' },
      lockClick: (e)=>{
        e.stopPropagation();
        if(this.state.unlocked){
          try{ sessionStorage.removeItem('pm_unlocked_v1'); }catch(_){}
          this.setState({ unlocked:false, pwOpen:false, pwError:false, tokenOpen:false, tokenError:false });
        } else {
          this.setState({ pwOpen:true, pwError:false });
        }
      },

      pwOpen,
      pwPlaceholder: pwError ? 'wrong' : 'password',
      pwInputStyle: { position:'absolute', top:'26px', right:0, zIndex:50, width:'140px', fontSize:'11px', fontFamily:"'Courier New',monospace", letterSpacing:'.5px', padding:'5px 7px', border: (pwError||tokenError) ? '1px solid #c0392b' : '1px solid #ddd', borderRadius:'3px', outline:'none', color:'#333', background:'#fff', boxShadow:'0 4px 14px rgba(0,0,0,.08)' },
      onPwKey: async (e)=>{
        if(e.key==='Escape'){ this.setState({ pwOpen:false, pwError:false }); return; }
        if(e.key!=='Enter') return;
        const val = e.target.value;
        const ok = await this.checkPassword(val);
        if(!ok){ e.target.value=''; this.setState({ pwError:true }); return; }
        if(this.state.ghToken){
          this.setState({ pwOpen:false, pwError:false, unlocked:true });
          try{ sessionStorage.setItem('pm_unlocked_v1','1'); }catch(_){}
        } else {
          this.setState({ pwOpen:false, pwError:false, tokenOpen:true, tokenError:false });
        }
      },

      tokenOpen,
      tokenPlaceholder: tokenError ? 'invalid token' : 'github token',
      onTokenKey: async (e)=>{
        if(e.key==='Escape'){ this.setState({ tokenOpen:false, tokenError:false }); return; }
        if(e.key!=='Enter') return;
        const val = e.target.value.trim();
        if(!val) return;
        const ok = await this.verifyToken(val);
        if(ok){
          try{ sessionStorage.setItem('pm_gh_token_v1', val); sessionStorage.setItem('pm_unlocked_v1','1'); }catch(_){}
          this.setState({ ghToken:val, tokenOpen:false, tokenError:false, unlocked:true });
        } else {
          e.target.value='';
          this.setState({ tokenError:true });
        }
      },

      showStatus: unlocked && (publishing || !!publishError),
      statusText: publishing ? 'saving…' : (publishError ? 'error' : ''),
      statusTitle: publishError || '',
      statusStyle: { fontSize:'10px', fontFamily:"'Courier New',monospace", letterSpacing:'.5px', color: publishError ? '#c0392b' : '#999999' }
    };
  }
}
</script>
</body>
</html>
